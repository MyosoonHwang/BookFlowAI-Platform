---
# cicd/ansible/playbooks/glue-deploy.yml
# Glue 스크립트 S3 sync + Job StartJobRun
# 실행 위치: Ansible CN (/opt/bookflow) · localhost 연결
# Glue 스크립트 위치: /opt/bookflow-apps/glue-jobs (Apps repo clone · ansible-node UserData)
# 호출: BookFlowAI-Apps GHA SSM Send-Command → ansible-playbook glue-deploy.yml -e github_sha=<sha>

- name: Glue scripts redeploy
  hosts: localhost
  gather_facts: false

  vars:
    region: ap-northeast-1
    glue_scripts_root: /opt/bookflow-apps/glue-jobs
    glue_jobs:
      - raw-pos-mart
      - raw-sns-mart
      - raw-aladin-mart
      - raw-event-mart
      - sales-daily-agg
      - features-build

  pre_tasks:
    - name: AWS account ID 조회
      command: aws sts get-caller-identity --query Account --output text
      register: account_result
      changed_when: false

    - name: S3 버킷 이름 설정
      set_fact:
        s3_bucket: "bookflow-glue-scripts-{{ account_result.stdout | trim }}"

    - name: 변수 확인
      debug:
        msg:
          - "S3 bucket : {{ s3_bucket }}"
          - "scripts   : {{ glue_scripts_root }}"
          - "sha       : {{ github_sha | default('not-set') }}"

  roles:
    - glue-scripts
