AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW · Tier 00 · S3 Buckets (raw·mart·tf-state·cp-artifacts·glue-scripts · audit optional)

Parameters:
  ProjectName:
    Type: String
    Default: bookflow
  AccountSuffix:
    Type: String
    Description: Bucket 이름 유니크성 위해 account suffix (예. last 4 digits)
    Default: ''
  EnableAuditBucket:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Audit bucket (CloudTrail · ObjectLock GOVERNANCE 90일) · cloudtrail/cloudwatch 사용 시만 true

Conditions:
  HasSuffix: !Not [!Equals [!Ref AccountSuffix, '']]
  WithAuditBucket: !Equals [!Ref EnableAuditBucket, 'true']

Resources:
  # ─── Raw 데이터 (POS · SNS · 알라딘 · 공공데이터 · historical) ───
  RawBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If [HasSuffix, !Sub '${ProjectName}-raw-${AccountSuffix}', !Sub '${ProjectName}-raw-${AWS::AccountId}']
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: RawToGlacier90d
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: 90

  # ─── Mart (Glue ETL 결과) ───
  MartBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If [HasSuffix, !Sub '${ProjectName}-mart-${AccountSuffix}', !Sub '${ProjectName}-mart-${AWS::AccountId}']
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ─── Audit (CloudTrail 로그 · 감사 의무 · EnableAuditBucket=true 시만) ───
  AuditBucket:
    Type: AWS::S3::Bucket
    Condition: WithAuditBucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If [HasSuffix, !Sub '${ProjectName}-audit-${AccountSuffix}', !Sub '${ProjectName}-audit-${AWS::AccountId}']
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !ImportValue
                Fn::Sub: ${ProjectName}-kms-cloudtrail-arn
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      ObjectLockEnabled: true
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            # GOVERNANCE: 관리자(s3:BypassGovernanceRetention)는 만료 전 삭제 가능
            # COMPLIANCE 는 root 도 90일간 삭제 불가 → 학프 환경엔 과함
            Mode: GOVERNANCE
            Days: 90
      LifecycleConfiguration:
        Rules:
          # Object Lock 만료(91일) 직후 자동 삭제 — 학프 종료 후 stray 자원 방지
          - Id: ExpireAuditAfterRetention
            Status: Enabled
            ExpirationInDays: 91
            NoncurrentVersionExpiration:
              NoncurrentDays: 91
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  # CloudTrail이 audit bucket에 쓸 수 있게 Bucket Policy
  AuditBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: WithAuditBucket
    Properties:
      Bucket: !Ref AuditBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt AuditBucket.Arn
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub ${AuditBucket.Arn}/AWSLogs/${AWS::AccountId}/*
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  # ─── TF State (GCP Terraform backend가 아닌, 혹시 AWS에서도 쓸 때용) ───
  TfStateBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If [HasSuffix, !Sub '${ProjectName}-tf-state-${AccountSuffix}', !Sub '${ProjectName}-tf-state-${AWS::AccountId}']
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ─── CodePipeline Artifacts ───
  CpArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If [HasSuffix, !Sub '${ProjectName}-cp-artifacts-${AccountSuffix}', !Sub '${ProjectName}-cp-artifacts-${AWS::AccountId}']
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldArtifacts
            Status: Enabled
            ExpirationInDays: 30

  # ─── Glue Scripts (Ansible이 sync) ───
  GlueScriptsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If [HasSuffix, !Sub '${ProjectName}-glue-scripts-${AccountSuffix}', !Sub '${ProjectName}-glue-scripts-${AWS::AccountId}']
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

Outputs:
  RawBucketName:
    Value: !Ref RawBucket
    Export:
      Name: !Sub ${ProjectName}-s3-raw-name
  RawBucketArn:
    Value: !GetAtt RawBucket.Arn
    Export:
      Name: !Sub ${ProjectName}-s3-raw-arn

  MartBucketName:
    Value: !Ref MartBucket
    Export:
      Name: !Sub ${ProjectName}-s3-mart-name
  MartBucketArn:
    Value: !GetAtt MartBucket.Arn
    Export:
      Name: !Sub ${ProjectName}-s3-mart-arn

  AuditBucketName:
    Condition: WithAuditBucket
    Value: !Ref AuditBucket
    Export:
      Name: !Sub ${ProjectName}-s3-audit-name
  AuditBucketArn:
    Condition: WithAuditBucket
    Value: !GetAtt AuditBucket.Arn
    Export:
      Name: !Sub ${ProjectName}-s3-audit-arn

  TfStateBucketName:
    Value: !Ref TfStateBucket
    Export:
      Name: !Sub ${ProjectName}-s3-tf-state-name

  CpArtifactsBucketName:
    Value: !Ref CpArtifactsBucket
    Export:
      Name: !Sub ${ProjectName}-s3-cp-artifacts-name

  GlueScriptsBucketName:
    Value: !Ref GlueScriptsBucket
    Export:
      Name: !Sub ${ProjectName}-s3-glue-scripts-name
