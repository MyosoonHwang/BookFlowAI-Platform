AWSTemplateFormatVersion: '2010-09-09'
Description: >
  BOOKFLOW · Tier 00 · ACM
  Client VPN server cert skeleton (실 cert는 easy-rsa로 생성 후 aws acm import-certificate 수동 1회)
  이 yaml은 "어떤 cert를 쓸지" ARN을 Parameter Store에 저장하는 역할만.

Parameters:
  ProjectName:
    Type: String
    Default: bookflow
  ClientVpnServerCertArn:
    Type: String
    Description: easy-rsa로 생성 후 aws acm import-certificate 해서 받은 ARN
    Default: ''  # 초기엔 비워둠. Day 0에 cert 준비 후 aws ssm put-parameter 로 업데이트
  ClientVpnClientCaCertArn:
    Type: String
    Description: Client 쪽 CA 인증서 ARN
    Default: ''

Conditions:
  HasServerCert: !Not [!Equals [!Ref ClientVpnServerCertArn, '']]
  HasClientCaCert: !Not [!Equals [!Ref ClientVpnClientCaCertArn, '']]

Resources:
  # Parameter Store에 cert ARN 저장 (다른 stack이 참조)
  ServerCertArnParam:
    Type: AWS::SSM::Parameter
    Condition: HasServerCert
    Properties:
      Name: !Sub /${ProjectName}/acm/client-vpn-server-cert-arn
      Type: String
      Value: !Ref ClientVpnServerCertArn
      Description: Client VPN 서버 인증서 ARN (easy-rsa 생성 · ACM import)

  ClientCaCertArnParam:
    Type: AWS::SSM::Parameter
    Condition: HasClientCaCert
    Properties:
      Name: !Sub /${ProjectName}/acm/client-vpn-client-ca-cert-arn
      Type: String
      Value: !Ref ClientVpnClientCaCertArn
      Description: Client VPN 클라이언트 CA 인증서 ARN

Outputs:
  ServerCertArn:
    Condition: HasServerCert
    Value: !Ref ClientVpnServerCertArn
    Export:
      Name: !Sub ${ProjectName}-acm-client-vpn-server-arn

  ClientCaCertArn:
    Condition: HasClientCaCert
    Value: !Ref ClientVpnClientCaCertArn
    Export:
      Name: !Sub ${ProjectName}-acm-client-vpn-client-ca-arn

  SetupInstructions:
    Value: >
      easy-rsa로 server.crt + ca.crt 생성 후
      'aws acm import-certificate --certificate file://server.crt --private-key file://server.key --certificate-chain file://ca.crt'
      실행. 받은 ARN을 이 stack에 Parameter로 재-deploy.
