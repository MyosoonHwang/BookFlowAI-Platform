AWSTemplateFormatVersion: '2010-09-09'
Description: >
  BOOKFLOW · Tier 00 · CodeStar Connection (GitHub OAuth for CodePipeline)
  ⚠   AWS Console   Activate  (PENDING → AVAILABLE)
  : 1)  stack deploy · 2) Console Developer Tools > Connections  pending 
        3) Update pending connection · 4) GitHub App  · 5)  

Parameters:
  ProjectName:
    Type: String
    Default: bookflow

Resources:
  GitHubConnection:
    Type: AWS::CodeStarConnections::Connection
    Properties:
      ConnectionName: !Sub ${ProjectName}-github
      ProviderType: GitHub

Outputs:
  ConnectionArn:
    Value: !Ref GitHubConnection
    Export:
      Name: !Sub ${ProjectName}-codestar-github-connection-arn

  ActivateInstructions:
    Value: >
      Console > Developer Tools > Settings > Connections  PENDING  connection 
      → 'Update pending connection' → GitHub App install  → AVAILABLE 
