AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW · Tier 00 · ECR Repositories (12개 · Pod 8 + ECS 3 + Publisher 1)

Parameters:
  ProjectName:
    Type: String
    Default: bookflow

Resources:
  # ─── EKS Pod 이미지 (8개) ───
  EcrAuthPod:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}/auth-pod
      ImageScanningConfiguration: { ScanOnPush: true }
      EncryptionConfiguration: { EncryptionType: AES256 }
      LifecyclePolicy:
        LifecyclePolicyText: |
          { "rules": [{ "rulePriority": 1, "description": "최신 10개 유지", "selection": { "tagStatus": "any", "countType": "imageCountMoreThan", "countNumber": 10 }, "action": { "type": "expire" } }] }

  EcrDashboardBff:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}/dashboard-bff
      ImageScanningConfiguration: { ScanOnPush: true }
      EncryptionConfiguration: { EncryptionType: AES256 }
      LifecyclePolicy:
