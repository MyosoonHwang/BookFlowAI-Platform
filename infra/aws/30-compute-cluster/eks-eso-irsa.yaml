AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW · Tier 30 · External Secrets Operator IRSA Role (auth-pod 등 Pod 가 Secrets Manager → K8s Secret 로 sync)

Parameters:
  ProjectName:
    Type: String
    Default: bookflow
  ServiceAccountNamespace:
    Type: String
    Default: external-secrets
    Description: ESO Helm chart 가 ServiceAccount 만드는 namespace
  ServiceAccountName:
    Type: String
    Default: external-secrets
    Description: ESO ServiceAccount 이름

Resources:
  # ─── IRSA Role (ESO Operator Pod 가 SA annotation 으로 assume) ───
  EsoRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-eso-role
      AssumeRolePolicyDocument: !Sub
        - |
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": {"Federated": "${IdP}"},
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringEquals": {
                  "${OidcHost}:sub": "system:serviceaccount:${Ns}:${Sa}",
                  "${OidcHost}:aud": "sts.amazonaws.com"
                }
              }
            }]
          }
        - IdP: !ImportValue
            Fn::Sub: ${ProjectName}-eks-oidc-provider-arn
          OidcHost: !Select
            - 1
            - !Split
              - 'https://'
              - !ImportValue
                Fn::Sub: ${ProjectName}-eks-oidc-issuer-url
          Ns: !Ref ServiceAccountNamespace
          Sa: !Ref ServiceAccountName
      Policies:
        - PolicyName: SecretsManagerRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                  - secretsmanager:ListSecrets
                Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/*
        - PolicyName: SsmParameterRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/*
        - PolicyName: KmsDecrypt
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                Resource: !ImportValue
                  Fn::Sub: ${ProjectName}-kms-eks-arn

Outputs:
  EsoRoleArn:
    Value: !GetAtt EsoRole.Arn
    Export: { Name: !Sub '${ProjectName}-eso-role-arn' }
  EsoRoleName:
    Value: !Ref EsoRole
    Export: { Name: !Sub '${ProjectName}-eso-role-name' }
