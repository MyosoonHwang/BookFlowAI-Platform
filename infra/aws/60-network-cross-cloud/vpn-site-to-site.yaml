AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW · Tier 60 · Site-to-Site VPN (Azure + GCP) · TGW Attachment + IPSec Tunnel

# 사용 시점:
#   Phase 1-2: 미사용
#   Phase 3-4: TGW 활성 후 cross-cloud 통신 (auth-pod → Azure Entra · forecast-svc → Vertex AI)
#
# 의존성:
#   1. Tier 10 customer-gateway · 실 IP 주입된 상태
#   2. Tier 60 tgw · TGW Hub 생성 완료
#
# Provider parameter 로 azure/gcp 각각 활성

Parameters:
  ProjectName:
    Type: String
    Default: bookflow
  EnableAzureVpn:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Azure VPN 활성 (Customer Gateway IP 주입 후 true)
  EnableGcpVpn:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: GCP HA VPN 활성 (Customer Gateway IP 주입 후 true)
  AzurePresharedKey:
    Type: String
    Default: ''
    NoEcho: true
    Description: Azure VPN Tunnel Pre-Shared Key (공란 시 AWS 자동 생성 · 민지에게 동일 값 전달)
  GcpPresharedKey:
    Type: String
    Default: ''
    NoEcho: true
    Description: GCP HA VPN Tunnel Pre-Shared Key (공란 시 AWS 자동 생성 · 우혁에게 vpn_shared_secret 으로 전달)

Conditions:
  WithAzure: !Equals [!Ref EnableAzureVpn, 'true']
  WithGcp: !Equals [!Ref EnableGcpVpn, 'true']
  WithAzurePsk: !Not [!Equals [!Ref AzurePresharedKey, '']]
  WithGcpPsk: !Not [!Equals [!Ref GcpPresharedKey, '']]

Resources:
  # ─── Azure Site-to-Site VPN Connection ───
  AzureVpnConnection:
    Type: AWS::EC2::VPNConnection
    Condition: WithAzure
    Properties:
      Type: ipsec.1
      CustomerGatewayId: !ImportValue
        Fn::Sub: ${ProjectName}-cgw-azure-id
      TransitGatewayId: !ImportValue
        Fn::Sub: ${ProjectName}-tgw-id
      StaticRoutesOnly: false
      VpnTunnelOptionsSpecifications: !If
        - WithAzurePsk
        - - PreSharedKey: !Ref AzurePresharedKey
            TunnelInsideCidr: 169.254.100.0/30
          - PreSharedKey: !Ref AzurePresharedKey
            TunnelInsideCidr: 169.254.100.4/30
        - !Ref AWS::NoValue
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-vpn-azure' }]

  # ─── GCP HA VPN Connection ───
  GcpVpnConnection:
    Type: AWS::EC2::VPNConnection
    Condition: WithGcp
    Properties:
      Type: ipsec.1
      CustomerGatewayId: !ImportValue
        Fn::Sub: ${ProjectName}-cgw-gcp-id
      TransitGatewayId: !ImportValue
        Fn::Sub: ${ProjectName}-tgw-id
      StaticRoutesOnly: false
      VpnTunnelOptionsSpecifications: !If
        - WithGcpPsk
        - - PreSharedKey: !Ref GcpPresharedKey
            TunnelInsideCidr: 169.254.21.0/30
          - PreSharedKey: !Ref GcpPresharedKey
            TunnelInsideCidr: 169.254.22.0/30
        - !Ref AWS::NoValue
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-vpn-gcp' }]

  # VPN Connection 을 TGW 에 attach 하면 자동으로 TGW VPN Attachment 생성됨
  # 단 attachment id 는 VpnConnectionId 와 다름 - CFN 에서 직접 GetAtt 못함
  # → RtPropagation/Association 은 cross_cloud.py 가 deploy 후 boto3 로 처리

Outputs:
  AzureVpnConnectionId:
    Condition: WithAzure
    Value: !Ref AzureVpnConnection
    Export: { Name: !Sub '${ProjectName}-vpn-azure-id' }
  GcpVpnConnectionId:
    Condition: WithGcp
    Value: !Ref GcpVpnConnection
    Export: { Name: !Sub '${ProjectName}-vpn-gcp-id' }
